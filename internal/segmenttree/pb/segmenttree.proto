syntax = "proto3";

package segmenttree.v1;

option go_package = "github.com/nepal80m/samurai/internal/segmenttree/pb;segmenttreepb";

message CurrentBalance {
  uint64 version = 1;
  bytes balance = 2;     // big-endian magnitude of big.Int
  uint64 start_block = 3;
}

message HistoricalBalance {
  CurrentBalance current = 1;
  uint64 end_block = 2;
}

// 32-byte hashes
message BatchTree {
  repeated bytes nodes = 1; // each element is 32 bytes (common.Hash)
}

message LXBatchTree {
  repeated BatchTree layers = 1; // index 0..MaxLayer-1
}

// 48-byte compressed KZG digest
message KZGDigest {
  bytes digest = 1; // 48 bytes
}

message LXBatchCommitment {
  repeated KZGDigest layers = 1; // index 0..MaxLayer-1
}

message AccountInfo {
  bytes account = 1; // 20 bytes (common.Address)
  CurrentBalance current_balance = 2;
  LXBatchTree current_lx_batch_tree = 3;
  LXBatchCommitment current_lx_batch_commitment = 4;
}



