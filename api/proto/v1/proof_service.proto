syntax = "proto3";

package samurai.api.v1;

option go_package = "github.com/nepal80m/samurai/api/pb/v1;proofpb";

// ProofService provides cryptographic proof generation for account balance history.
service ProofService {
  // GetProof generates range proofs for a given account and block range.
  rpc GetProof(GetProofRequest) returns (GetProofResponse);
  
  // GetProofStream streams range proofs for a given account and block range.
  rpc GetProofStream(GetProofRequest) returns (stream GetProofResponse);
}

// GetProofRequest specifies the account and block range for proof generation.
message GetProofRequest {
  // Ethereum account address (20 bytes, hex-encoded without 0x prefix or with).
  string account = 1;
  // Starting block number (inclusive).
  uint64 start_block = 2;
  // Ending block number (inclusive).
  uint64 end_block = 3;
}

// GetProofResponse contains the generated proofs and balance information.
message GetProofResponse {
  // List of range proofs covering the requested block range.
  repeated RangeProof range_proofs = 1;
  // List of historical balance entries for the range.
  repeated BalanceInfo balance_infos = 2;
  // Time taken to generate proofs in milliseconds.
  int64 generation_time_ms = 3;
  // MPT membership proof nodes (raw trie nodes, in traversal order).
  repeated bytes mpt_proof_nodes = 4;
  // Current balance of the account (big-endian bytes of big.Int).
  bytes current_balance = 5;
  // The block number for which the MPT proof is valid.
  uint64 mpt_block_number = 6;
}

// RangeProof represents a cryptographic proof for a range of blocks.
message RangeProof {
  // Layer in the commitment tree (1 to MaxLayer).
  int32 layer = 1;
  // Index within the layer.
  int32 idx = 2;
  // KZG commitment (48 bytes, compressed G1 point).
  bytes commitment = 3;
  // KZG proof (48 bytes, compressed G1 point).
  bytes proof = 4;
  // Block range covered by this proof.
  BlockRange block_range = 5;
  // Indices of dependent commitments from lower layers.
  repeated int32 dependent_commitments = 6;
}

// BlockRange represents a contiguous range of blocks.
message BlockRange {
  int32 start = 1;
  int32 end = 2;
}

// BalanceInfo represents historical balance information for an account.
message BalanceInfo {
  // Version number in the commitment tree.
  uint64 version = 1;
  // Block number when this balance became active.
  uint64 start_block = 2;
  // Block number when this balance was superseded (inclusive).
  uint64 end_block = 3;
  // Balance value (big-endian bytes of big.Int).
  bytes balance = 4;
}
